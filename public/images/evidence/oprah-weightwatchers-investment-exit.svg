<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12" />
  <rect x="24" y="16" width="752" height="52" rx="8" fill="#4338ca" opacity="0.6" />
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#e0e7ff" letter-spacing="3">EVIDENCE</text>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Oprah's WeightWatchers Investment and Departure</text>
  <line x1="200" y1="140" x2="600" y2="140" stroke="#6366f1" stroke-width="2" />
  <text x="400" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Oct 2015: Purchased 10% stake in WW for ~$43M</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">2015-2022: Served on WW board, promoted diet programs</text>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Dec 2023: Disclosed using GLP-1 weight loss medications</text>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">May 2024: Acknowledged 25-year role in diet culture</text>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Sep 2024: Departed WW board, donated remaining shares</text>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a5b4fc">Source: Wikipedia — Oprah Winfrey</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#818cf8">Date: October 2015 – September 2024</text>
  <rect x="24" y="400" width="752" height="36" rx="8" fill="#4338ca" opacity="0.4" />
  <text x="400" y="424" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#c7d2fe" letter-spacing="2">INDELIBLE</text>
</svg>
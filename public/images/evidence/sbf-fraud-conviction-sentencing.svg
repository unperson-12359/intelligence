<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12" />
  <rect x="24" y="16" width="752" height="52" rx="8" fill="#4338ca" opacity="0.6" />
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#e0e7ff" letter-spacing="3">EVIDENCE</text>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">SBF Convicted on All 7 Fraud Counts, Sentenced to 25 Years</text>
  <line x1="200" y1="140" x2="600" y2="140" stroke="#6366f1" stroke-width="2" />
  <text x="400" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Dec 2022: SBF arrested in Bahamas, extradited to U.S.</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Oct 2023: Trial begins in Southern District of New York</text>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Nov 2, 2023: Jury convicts on all 7 counts of fraud</text>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Mar 28, 2024: Sentenced to 25 years in federal prison</text>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Counts include wire fraud, conspiracy, money laundering</text>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a5b4fc">Source: Wikipedia — Trial of Sam Bankman-Fried</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#818cf8">Date: November 2023 — March 2024</text>
  <rect x="24" y="400" width="752" height="36" rx="8" fill="#4338ca" opacity="0.4" />
  <text x="400" y="424" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#c7d2fe" letter-spacing="2">INDELIBLE</text>
</svg>
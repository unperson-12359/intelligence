<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#3B82F6dd"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="400" height="300" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="72" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="60" width="400" height="12" fill="url(#headerGrad)"/>

  <!-- Icon circle -->
  <circle cx="40" cy="36" r="22" fill="rgba(255,255,255,0.25)"/>
  <text x="40" y="43" text-anchor="middle" font-size="22">📸</text>

  <!-- Type label -->
  <text x="72" y="32" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-transform="uppercase" letter-spacing="1">SCREENSHOT</text>

  <!-- EVIDENCE label -->
  <text x="72" y="50" fill="rgba(255,255,255,0.85)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">EVIDENCE</text>

  <!-- Decorative line -->
  <rect x="24" y="84" width="352" height="1" fill="#F3F4F6"/>

  <!-- Caption text -->
  <text x="200" y="135" text-anchor="middle" fill="#1F2937" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Screenshot of suspended journalist</text>
    <text x="200" y="157" text-anchor="middle" fill="#1F2937" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">accounts on X (formerly Twitter)</text>

  <!-- Bottom section -->
  <rect x="24" y="230" width="352" height="1" fill="#F3F4F6"/>

  <!-- Source domain -->
  <text x="24" y="258" fill="#6B7280" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Source: x.com</text>

  <!-- Preserved date -->
  <text x="376" y="258" text-anchor="end" fill="#9CA3AF" font-family="system-ui, -apple-system, sans-serif" font-size="11">Preserved Dec 16, 2022</text>

  <!-- Intelligence branding -->
  <text x="200" y="284" text-anchor="middle" fill="#D1D5DB" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">INTELLIGENCE PLATFORM — ARCHIVED EVIDENCE</text>
</svg>
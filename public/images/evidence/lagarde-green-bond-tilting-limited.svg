<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12" />
  <rect x="24" y="16" width="752" height="52" rx="8" fill="#4338ca" opacity="0.6" />
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#e0e7ff" letter-spacing="3">EVIDENCE</text>
  <text x="400" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">ECB Green Bond Tilting: Limited Scope, Then Halted</text>
  <line x1="200" y1="130" x2="600" y2="130" stroke="#6366f1" stroke-width="2" />
  <text x="400" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Jul 2021: Lagarde announces climate-focused monetary policy</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">Oct 2022: ECB begins tilting corporate bond portfolio toward</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#c7d2fe">issuers with better climate performance</text>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Mar 2023: ECB stops net asset purchases — tilting ends</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">Green tilting operated for only ~5 months on reinvestments</text>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#fca5a5">ECB still holds billions in fossil fuel corporate bonds</text>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a5b4fc">Source: ECB Climate Action Plan / Wikipedia</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#818cf8">Date: October 2022 - March 2023</text>
  <rect x="24" y="400" width="752" height="36" rx="8" fill="#4338ca" opacity="0.4" />
  <text x="400" y="424" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#c7d2fe" letter-spacing="2">INDELIBLE</text>
</svg>